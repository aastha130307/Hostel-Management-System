<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Students - Vasudha</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script>
    async function loadStudents(){
      let res = await fetch('/backend/view_students.php');
      if(!res.ok){ document.getElementById('out').innerText = 'Error: ' + res.status; return; }
      let data = await res.json();
      let t = '<table class="table"><thead><tr><th>Roll</th><th>Name</th><th>Course</th><th>Branch</th><th>Room</th></tr></thead><tbody>';
      data.forEach(s => {
        t += `<tr><td>${s.rollno||''}</td><td>${(s.fname||'')+' '+(s.lname||'')}</td><td>${s.course||''}</td><td>${s.branch||''}</td><td>${s.room_no||''}</td></tr>`;
      });
      t += '</tbody></table>';
      document.getElementById('out').innerHTML = t;
    }
    window.onload = loadStudents;
  </script>
</head>
<body class="bg-light">
  <div class="container py-4">
    <h2>Students</h2>
    <div id="out">Loading...</div>
  </div>
</body>
</html>
